<header>
  <div>
    <a class="site-title" href="{{ site.url }}">{{ site.title }}</a>
    <br>
    <small>
      {% if site.tagshort %}
      {{ site.tagshort }}
      {% else %}
      {{ site.taglong }}
      {% endif %}
    </small>
  </div>

  <div id="navbar">
    <div id="nav_items">
      <a id="theme-toggle" class="toggle-icon" onclick="modeSwitcher()"></a>

      <div class="dropdown">
        <div class="dropdown-toggle">
          <span class="dropdown-arrow"></span>
        </div>
        <div class="dropdown-content">
          <a href="/">home</a>
          <a href="/blog">blog</a>
          <a href="/art">art</a>
          <a href="/cv">cv</a>
        </div>
      </div>

    </div>
  </div>

</header>
